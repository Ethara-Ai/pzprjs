tidepool:
  name: Tidepool
  base_type: tidepool
  interaction: cell_shading
  standard_rules:
    R1: Shade or leave cells unshaded
    R2: Each unshaded cell has a "depth" equal to its BFS distance (through unshaded cells) to the nearest grid-border cell
    R3: Border cells that are unshaded have depth 0
    R4: Clue cells show exact depths and cannot be shaded
    R5: All unshaded cells must form a single connected group
    R6: No 2x2 square may be entirely shaded
  custom_rules: {}
  controls:
    - "Left-click a cell to shade it"
    - "Right-click a cell to mark it as unshaded"

paritypipes:
  name: Parity Pipes
  base_type: paritypipes
  interaction: edge_drawing
  standard_rules:
    R1: Draw closed loops on grid edges
    R2: Every vertex is pre-colored black (B) or white (W)
    R3: "Black vertex: the loop passes through it (exactly 2 drawn edges)"
    R4: "White vertex: the loop does not pass through it (exactly 0 drawn edges)"
    R5: All drawn edges form disjoint simple closed loops
  custom_rules: {}
  controls:
    - "Left-click an edge to draw/toggle a line segment"
    - "Right-click an edge to mark it as no-line (X)"

radiance:
  name: Radiance
  base_type: radiance
  interaction: mirror_placement
  standard_rules:
    R1: One emitter (dark square with arrow) fires a beam in the arrow's direction
    R2: The beam travels in a straight line until it hits a mirror, target, or grid boundary
    R3: Forward slash (/) deflects the beam — UP becomes RIGHT, RIGHT becomes UP, DOWN becomes LEFT, LEFT becomes DOWN
    R4: Backslash (\) deflects the beam — UP becomes LEFT, LEFT becomes UP, DOWN becomes RIGHT, RIGHT becomes DOWN
    R5: The beam must reach the red target (bullseye) after all reflections
  custom_rules:
    R6:
      text: "All mirror slots must be used — the beam path must pass through every gray diamond on the grid"
      type: solution_constraint
      check: check_answer
    R7:
      text: "Each mirror slot must contain exactly one mirror (/ or \\) — no slot may be left empty"
      type: solution_constraint
      check: check_answer
    R8:
      text: "The beam terminates upon reaching the target — it does not continue past it"
      type: solution_constraint
      check: check_answer
  controls:
    - "Left-click a gray diamond to cycle: empty → / → \\ → empty"
    - "Right-click to cycle in reverse: empty → \\ → / → empty"
    - "Beam path updates in real-time as you place mirrors"
    - "Green beam = reached target; Red beam = missed target"

gradientwalls:
  name: Gradient Walls
  base_type: gradientwalls
  interaction: number_entry
  standard_rules:
    R1: Fill every empty cell with a number from 1 to N (where N is the maximum of rows and columns)
    R2: If a thick wall (border) exists between two adjacent cells, their values must differ by more than 1
    R3: If no wall exists between two adjacent cells, their values must differ by at most 1
    R4: Some cells contain pre-filled clue numbers that cannot be changed
  custom_rules: {}
  controls:
    - "Click a cell, then type a digit to place it"
    - "Left-click to cycle through values"

kageboshi:
  name: Kageboshi
  base_type: kageboshi
  interaction: cell_shading
  standard_rules:
    R1: Shade some cells on the board
    R2: Each number indicates the total count of shaded cells in its row plus the total count of shaded cells in its column
    R3: Cells with numbers cannot be shaded
    R4: No two shaded cells may be orthogonally adjacent
    R5: All unshaded cells must form a single orthogonally connected group
  custom_rules: {}
  controls:
    - "Left-click a cell to shade it"
    - "Right-click a cell to mark it as unshaded"

resonance:
  name: Resonance
  base_type: resonance
  interaction: object_placement
  standard_rules:
    R1: Each emitter broadcasts a signal that decays by Manhattan distance — strength at distance d = max(0, value - d)
    R2: Signals from multiple emitters are additive — each cell receives the sum of all signals reaching it
    R3: Each clue cell must receive exactly its stated total signal value
    R4: Each region contains at most one emitter
    R5: No two emitters may be orthogonally adjacent
  custom_rules:
    R6:
      text: "Emitter values are restricted to 1, 2, or 3"
      type: solution_constraint
      check: check_answer
    R7:
      text: "Emitters may only be placed on non-clue cells"
      type: solution_constraint
      check: check_answer
    R8:
      text: "The puzzle has exactly one valid solution"
      type: solution_constraint
      check: check_answer
  controls:
    - "Left-click an empty cell to cycle emitter value: 1 → 2 → 3 → empty"
    - "Right-click to cycle in reverse: empty → 3 → 2 → 1"
    - "Clue cells (numbered) cannot be modified"
    - "Green background = clue satisfied; Red background = clue violated"

pairloop:
  name: Pairloop
  base_type: pairloop
  interaction: edge_drawing
  standard_rules:
    R1: Draw lines along the edges of some cells to form a single closed loop
    R2: The loop cannot branch off or cross itself
    R3: "Number clues (0-4): exactly that many of the cell's 4 borders are part of the loop"
    R4: "Arrow clues: the cell's border in the arrow direction AND the adjacent cell's border in that same direction must both be loop segments (extended reach — 2 consecutive lines)"
    R5: A cell contains either a number clue or an arrow clue, never both
  custom_rules: {}
  controls:
    - "Left-click and drag between adjacent cells to draw a line segment"
    - "Right-click a border to mark it as no-line (X)"
